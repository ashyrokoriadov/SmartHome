<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <title>SmartHome UI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      html,body{height:100%;margin:0}
      #app-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Segoe UI,Arial,sans-serif;color:#444}
      .spinner{width:48px;height:48px;border:6px solid #e6e6e6;border-top-color:#3f51b5;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:12px}
      @keyframes spin{to{transform:rotate(360deg)}}
      .loading-text{font-size:14px}
      .no-js{color:#b00}
    </style>
  </head>
  <body>
    <app-root>
      <div id="app-loading">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loading-text">Loading application…</div>
      </div>
      <noscript><div class="no-js">JavaScript is required to run this application.</div></noscript>
    </app-root>
    <script>
      // Fallback: remove host loading indicator after 12s if Angular didn't bootstrap
      setTimeout(() => {
        try {
          const el = document.getElementById('app-loading');
          if (el) { console.warn('Fallback remover: removing app-loading'); el.remove(); }
        } catch (e) { console.error(e); }
      }, 12000);
    </script>
  </body>
</html>
